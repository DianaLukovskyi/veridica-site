<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts | VERIDICA</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="content">
      <div class="contact-box">
        <h1 class="section-title">Book a consultation</h1>

        <a class="contact-phone" href="tel:+380970083712">097-008-3712</a>
        <a class="contact-email" href="mailto:veridica.info@gmail.com"
          >veridica.info@gmail.com</a
        >
        <a class="whatsapp" href="https://wa.me/380970083712" target="_blank"
          >WhatsApp</a
        >

        <form
          action="https://formspree.io/f/xpqnqvvp"
          method="POST"
          class="consultation-form"
        >
          <input type="text" name="name" placeholder="Your name" required />

          <input type="tel" name="phone" placeholder="Phone number" required />

          <input type="email" name="email" placeholder="Email" />

          <textarea
            name="message"
            placeholder="Describe your situation"
          ></textarea>

          <button type="submit">Book consultation</button>
        </form>
      </div>
    </section>
  </body>
</html>
