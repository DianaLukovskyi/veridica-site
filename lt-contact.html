<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontaktai | VERIDICA</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="content">
      <div class="contact-box">
        <h1 class="section-title">Registracija konsultacijai</h1>

        <a class="contact-phone" href="tel:+380970083712">097-008-3712</a>
        <a class="contact-email" href="mailto:veridica.info@gmail.com"
          >veridica.info@gmail.com</a
        >
        <a
          class="whatsapp"
          href="https://wa.me/380970083712?text=Sveiki!%20Norėčiau%20užsiregistruoti%20VERIDICA%20konsultacijai."
          target="_blank"
        >
          WhatsApp
        </a>

        <form
          action="https://formspree.io/f/xpqnqvvp"
          method="POST"
          class="consultation-form"
        >
          <input type="text" name="name" placeholder="Jūsų vardas" required />

          <input
            type="tel"
            name="phone"
            placeholder="Telefono numeris"
            required
          />

          <input type="email" name="email" placeholder="El. paštas" />

          <textarea
            name="message"
            placeholder="Aprašykite savo situaciją"
          ></textarea>

          <button type="submit">Registruotis konsultacijai</button>
        </form>
      </div>
    </section>
  </body>
</html>
